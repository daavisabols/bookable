<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Verify</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70px;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #captcha-container { display: flex; justify-content: center; }
    .loading { color: #9ca3af; font-size: 13px; }
    /* Hide any injected chat widgets (e.g. LiveChatAI from Netlify snippet injection) */
    #live-chat-ai-host, iframe[src*="livechatai"], div[id*="livechat"],
    div[class*="livechat"], div[id*="aibot"], div[class*="aibot"],
    div[id*="chat-widget"], div[class*="chat-widget"] {
      display: none !important; visibility: hidden !important;
      width: 0 !important; height: 0 !important; pointer-events: none !important;
    }
  </style>
</head>
<body>
  <div id="captcha-container"><span class="loading">Loading...</span></div>
  <script>
    // Kill injected chat widgets (Netlify snippet injection adds LiveChatAI)
    (function() {
      var kill = function() {
        var el = document.getElementById('live-chat-ai-host');
        if (el) el.remove();
        document.querySelectorAll('script[src*="livechatai"], script[src*="aibot"]').forEach(function(s) { s.remove(); });
      };
      kill();
      // Keep killing in case it's injected after our script runs
      var killInterval = setInterval(kill, 200);
      setTimeout(function() { clearInterval(killInterval); }, 5000);
      // Also observe DOM for injected nodes
      if (window.MutationObserver) {
        new MutationObserver(function(mutations) {
          mutations.forEach(function(m) {
            m.addedNodes.forEach(function(n) {
              if (n.nodeType === 1 && (n.id === 'live-chat-ai-host' || (n.tagName === 'SCRIPT' && n.src && (n.src.includes('livechatai') || n.src.includes('aibot'))))) {
                n.remove();
              }
            });
          });
        }).observe(document.documentElement, { childNodes: true, subtree: true });
      }
    })();

    // Fallback: remove "Loading..." text after 5s if Turnstile never fires onload
    setTimeout(function() {
      var el = document.querySelector('.loading');
      if (el) el.textContent = '';
    }, 5000);
    // Read site key from URL params so the mobile app can pass it
    var params = new URLSearchParams(window.location.search);
    var siteKey = params.get('sitekey') || '';
    var pendingMessages = [];

    function post(msg) {
      var str = JSON.stringify(msg);
      // postMessage to React Native WebView (may not be injected yet)
      if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
        window.ReactNativeWebView.postMessage(str);
      } else {
        // Queue and retry — ReactNativeWebView is injected after page load
        pendingMessages.push(str);
      }
    }

    // Flush queued messages once ReactNativeWebView becomes available
    var flushInterval = setInterval(function() {
      if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage && pendingMessages.length > 0) {
        pendingMessages.forEach(function(m) {
          window.ReactNativeWebView.postMessage(m);
        });
        pendingMessages = [];
        clearInterval(flushInterval);
      }
    }, 100);

    // Stop trying after 10 seconds
    setTimeout(function() { clearInterval(flushInterval); }, 10000);

    function onTurnstileLoad() {
      if (!siteKey) {
        post({ type: 'error', error: 'No sitekey provided' });
        return;
      }
      try {
        document.querySelector('.loading')?.remove();
        turnstile.render('#captcha-container', {
          sitekey: siteKey,
          callback: function(token) { post({ type: 'token', token: token }); },
          'error-callback': function(err) { post({ type: 'error', error: String(err) }); },
          'expired-callback': function() { post({ type: 'expired' }); },
          'timeout-callback': function() { post({ type: 'timeout' }); },
          size: 'compact',
          theme: params.get('theme') || 'light',
        });
        post({ type: 'ready' });
      } catch(e) {
        post({ type: 'error', error: e.message });
      }
    }
  </script>
</body>
</html>
