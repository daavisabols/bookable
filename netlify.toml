[build]
  command = "npm run build"
  publish = "."

[[edge_functions]]
  function = "geo-currency"
  path = "/*"

# Block high-volume scanner paths with 410 Gone to reduce bot noise.
[[redirects]]
  from = "/xmlrpc.php"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/wp-*"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "/"
  status = 410
  force = true

